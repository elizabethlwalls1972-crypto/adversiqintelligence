# ═══════════════════════════════════════════════════════════════════════════════
# BW NEXUS AI — MULTI-TENANT INSTITUTIONAL INTELLIGENCE OS
# Docker Compose: Production / Staging / Development
# ═══════════════════════════════════════════════════════════════════════════════

version: '3.8'

# ── Shared environment defaults ─────────────────────────────────────────────
x-common-env: &common-env
  NODE_ENV: production
  PORT: 3001
  DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/bw_nexus_ai}
  # AI Provider Keys (optional - add to .env when ready)
  # OPENAI_API_KEY: ${OPENAI_API_KEY}
  # GROQ_API_KEY: ${GROQ_API_KEY}
  # TOGETHER_API_KEY: ${TOGETHER_API_KEY}
  FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
  REDIS_URL: redis://redis:6379
  # Multi-tenant configuration
  TENANT_ID: ${TENANT_ID:-default}
  TENANT_NAME: ${TENANT_NAME:-BW Nexus}
  TENANT_LOCALE: ${TENANT_LOCALE:-en}
  TENANT_JURISDICTION: ${TENANT_JURISDICTION:-global}
  TENANT_MAX_SESSIONS: ${TENANT_MAX_SESSIONS:-100}
  # Governance / audit
  AUDIT_LOG_ENABLED: ${AUDIT_LOG_ENABLED:-true}
  AUDIT_LOG_RETENTION_DAYS: ${AUDIT_LOG_RETENTION_DAYS:-365}
  GDPR_MODE: ${GDPR_MODE:-false}
  DATA_REDACTION_ENABLED: ${DATA_REDACTION_ENABLED:-false}

services:
  # ── Primary Application ───────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      replicas: ${APP_REPLICAS:-1}
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Redis — Session cache & live-data cache ───────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bw_nexus_ai}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-bw_nexus_ai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Nginx reverse proxy (SSL termination + rate limiting) ─────────────────
  # nginx:
  #   image: nginx:alpine
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - app
  #   restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

# ── Usage notes ──────────────────────────────────────────────────────────────
# Single tenant (default):
#   docker compose up
#
# Tenant with GDPR mode:
#   TENANT_ID=eu-gov TENANT_JURISDICTION=EU GDPR_MODE=true docker compose up
#
# Scale app horizontally (requires nginx load balancer):
#   APP_REPLICAS=3 docker compose up --scale app=3
#
# Staging profile:
#   NODE_ENV=staging TENANT_MAX_SESSIONS=10 docker compose up

